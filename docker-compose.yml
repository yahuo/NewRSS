services:
  newrss:
    build: .
    container_name: newrss
    restart: unless-stopped
    ports:
      - "8787:8787"
    env_file:
      - .env
    environment:
      PORT: "${PORT:-8787}"
      HOST: "0.0.0.0"
      DB_PATH: "/app/data/newrss.db"
      APP_BASE_URL: "${APP_BASE_URL:-}"
      DEFAULT_FEED_NAME: "${DEFAULT_FEED_NAME:-wired}"
      DEFAULT_FEED_URL: "${DEFAULT_FEED_URL:-https://www.wired.com/feed/rss}"
      DEFAULT_FEED_FOLDER: "${DEFAULT_FEED_FOLDER:-}"
      MAX_ITEMS_PER_REFRESH: "${MAX_ITEMS_PER_REFRESH:-10}"
      MAX_ITEMS_PER_FEED: "${MAX_ITEMS_PER_FEED:-50}"
      REFRESH_INTERVAL_MINUTES: "${REFRESH_INTERVAL_MINUTES:-30}"
      REFRESH_ON_BOOT: "${REFRESH_ON_BOOT:-true}"
      HTTP_TIMEOUT_MS: "${HTTP_TIMEOUT_MS:-15000}"
      UPSTREAM_PROXY_URL: "${UPSTREAM_PROXY_URL:-}"
      TRANSLATION_PROVIDER: "${TRANSLATION_PROVIDER:-gemini}"
      READ_LATER_TRANSLATION_PROVIDER: "${READ_LATER_TRANSLATION_PROVIDER:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.5-flash}"
      GEMINI_TIMEOUT_MS: "${GEMINI_TIMEOUT_MS:-90000}"
      CODEX_AUTH_FILE: "${CODEX_AUTH_FILE:-}"
      CODEX_MODEL: "${CODEX_MODEL:-openai-codex/gpt-5.4}"
      CODEX_BASE_URL: "${CODEX_BASE_URL:-}"
      CODEX_TIMEOUT_MS: "${CODEX_TIMEOUT_MS:-90000}"
      TRANSLATE_TARGET_LANGUAGE: "${TRANSLATE_TARGET_LANGUAGE:-Simplified Chinese}"
    volumes:
      - ./data:/app/data
      - ./cookies:/app/secrets:ro
      - ${HOME}/.codex/auth.json:/app/codex-auth/auth.json:ro
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.js"]
      interval: 30s
      timeout: 5s
      retries: 3
