<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NewRSS Read Later 设置</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <h1>NewRSS Read Later</h1>
      <p>设置扩展提交稍后读任务时使用的 NewRSS 服务地址。</p>
      <form id="options-form">
        <label for="base-url">NewRSS 服务地址</label>
        <input id="base-url" name="baseUrl" type="url" required />
        <p class="hint">只保存协议、主机和端口，例如 http://newrss.local:8787。</p>
        <button type="submit">保存设置</button>
        <button id="reset-button" type="button">恢复默认值</button>
        <div id="status" role="status" aria-live="polite"></div>
      </form>
    </main>
    <script type="module" src="options.mjs"></script>
  </body>
</html>
